{{ define "main" }}
<section class="section blog-single">

    {{ with ( partial "utilities/get-featured-image.html" . ) }}
        {{ with resources.Get . }}
        <div style="width: 100%; max-height: 380px; overflow: hidden; border-bottom: 1px solid #d4e8e6;">
            <img src="{{ .Permalink }}" alt="{{ .Title }}" width="{{ .Width }}" height="{{ .Height }}"
                style="width: 100%; height: 380px; object-fit: cover; object-position: center 60%; display: block;" />
        </div>
        {{ end }}
    {{ end }}

    <div class="container py-5">
        <div class="row pb-3">
            <div class="col-12">
                <div style="max-width: 780px;">
                    {{ with .Title }}
                    <div style="width: 32px; height: 2px; background-color: #3dada0; margin-bottom: 1rem;"></div>
                    <h2 style="font-size: clamp(1.4rem, 2.5vw, 2rem); font-weight: 500; color: #1a2e2d; margin-bottom: 0.5rem;">{{ . }}</h2>
                    {{ end }}
                    {{ with .Params.description }}
                    <p style="font-size: 0.9rem; color: #5a8a87; margin-bottom: 0;">{{ . }}</p>
                    {{ end }}
                </div>
            </div>
        </div>
        <div class="row pb-5">
            <div class="col-12">
                <div class="blog-content">{{ .Content }}</div>
            </div>
        </div>
    </div>

</section>
{{ end }}
