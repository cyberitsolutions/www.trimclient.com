<section class="section-fork" style="border-bottom: 1px solid #d4e8e6;">
  <div class="fork-grid">
    {{ range .content.panels }}
    <a href="{{ .url }}" class="fork-panel">
      <p class="fork-eyebrow">{{ .eyebrow }}</p>
      <h3 class="fork-title">{{ .title }}</h3>
      <p class="fork-text">{{ .text }}</p>
      <span class="fork-link">{{ .label }} →</span>
    </a>
    {{ end }}
  </div>
</section>
