<section class="section testimonials" style="padding: 3rem 0; border-top: 1px solid #d4e8e6; border-bottom: 1px solid #d4e8e6;">
  <div class="container">
    {{ with .content.featured }}
    <blockquote style="border-left: 2px solid #3dada0; padding: 1rem 1.5rem; margin: 0; color: #5a8a87; font-style: normal;">
      <p style="font-size: 1rem; line-height: 1.75; margin-bottom: 0.75rem; color: #5a8a87;">"{{ .text }}"</p>
      <footer style="font-size: 0.85rem; color: #026670; font-weight: 500;">{{ .client }}</footer>
    </blockquote>
    {{ end }}
  </div>
</section>
