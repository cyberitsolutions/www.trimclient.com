    - eyebrow: "Mental health"
      title: "Managed computing for mental health facilities"
      text: "A therapeutic environment requires technology that is unobtrusive, reliable, and fully under staff control. Trimclient provides resident access to education, communication, and media without compromising clinical oversight."
      label: "Learn more"
      url: "/mental-health"

    - eyebrow: "Call centres"
      title: "Locked-down workstations for high-compliance environments"
      text: "Eliminate USB risk, personal browsing, and unsanctioned software. Trimclient delivers a fully auditable, policy-enforced desktop that reduces IT support burden and keeps agents on task."
      label: "Learn more"
      url: "/call-centres"

  footer:
    text: "Not sure where to start? Contact us directly — we are experienced in helping organisations at any stage of the planning process."
    label: "Get in touch"
