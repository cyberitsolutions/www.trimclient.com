content:
  panels:
    - eyebrow: "Youth detention"
      title: "Secure computing for youth justice facilities"
      text: "Education continuity, secure family contact, child-safe content filtering, and staff efficiency gains — built into a single managed platform designed for the youth detention environment."
      label: "Learn more"
